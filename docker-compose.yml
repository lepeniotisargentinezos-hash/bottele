services:
  postgres:
    image: postgres:16-alpine
    container_name: vercel-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vercel_monitor
      POSTGRES_PASSWORD: vercel_monitor
      POSTGRES_DB: vercel_monitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vercel_monitor -d vercel_monitor']
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: vercel-monitor-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vercel_monitor:vercel_monitor@postgres:5432/vercel_monitor?schema=public
    ports:
      - '3000:3000'

volumes:
  pgdata:
